<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="/assets/css/styles.css" rel="stylesheet" />
    <link href="/assets/css/ui.css" rel="stylesheet" />
    <title>subte.cc - Login / Register</title>
    <link href="/favicon.svg" rel="icon" type="image/svg+xml" />
    <meta content="subte.cc - Dynamic DNS for everyone. Free as in freedom and beer." name="description" />
    <meta content="subte.cc, dynamic dns, ddns, free dns, open source, privacy" name="keywords" />
    <meta content="subte.cc" name="author" />
    <meta content="subte.cc" property="og:title" />
    <meta content="subte.cc - Dynamic DNS for everyone. Free as in freedom and beer." property="og:description" />
    <meta content="website" property="og:type" />
    <meta content="https://subte.cc/img/opengraph.png" property="og:image" />
</head>

<body>
    <header>
        <div class="header-left">
            <a href="/"><img class="logo" src="/assets/img/branding.svg" /></a>
            <button class="mobile-menu-btn" onclick="document.querySelector('header').classList.toggle('nav-open')">
                <svg fill="none" height="24" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="24">
                    <line x1="3" x2="21" y1="12" y2="12"></line>
                    <line x1="3" x2="21" y1="6" y2="6"></line>
                    <line x1="3" x2="21" y1="18" y2="18"></line>
                </svg>
            </button>
            <div class="nav-links" id="nav-links">
                <a href="/docs"><button>Docs</button></a>
                <a href="/news"><button>News</button></a>
                <a href="/about"><button>About</button></a>
            </div>
        </div>
        <div class="header-right">
            <a href="/dashboard"><button class="btn-dash">Dashboard</button></a>
        </div>
    </header>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="tab-active" id="login-tab">Login</button>
                <button class="tab-inactive" id="signup-tab">Sign Up</button>
            </div>
            <form class="space-y-4" id="auth-form">
                <div class="auth-form-group">
                    <label>Email Address</label>
                    <input name="email" placeholder="you@example.com" required="" type="email" />
                </div>
                <div class="auth-form-group">
                    <label>Password</label>
                    <input id="password-input" name="password" placeholder="••••••••" required="" type="password" />
                </div>
                <div class="auth-form-group" id="confirm-password-gp" style="display: none;">
                    <label>Confirm Password</label>
                    <input id="confirm-password-input" placeholder="••••••••" type="password" />
                </div>
                <div class="auth-form-group" id="invite-code-gp" style="display: none;">
                    <label>Invite Code</label>
                    <input id="invite-code-input" name="invite_code" placeholder="GNU-ROCKS.." type="text" />
                </div>
                <div id="terms-gp"
                    style="font-size: 0.8rem; margin-bottom: 1rem; color: var(--text-muted); display: none;">
                    <input id="terms-checkbox" name="checkbox" type="checkbox" value="1" /> I agree to the <a
                        href="/terms" target="_blank">Terms</a> and <a href="/privacy" target="_blank">Privacy
                        Policy</a>
                </div>
                <button class="btn-primary" id="submit-btn" type="submit">
                    Login
                </button>
            </form>
            <div class="auth-footer" id="signup-prompt">
                Don't have an account? <button id="signup-switch">Sign Up</button>
            </div>
        </div>
        <div class="auth-card" id="oauth-container" style="max-width: 290px; display: none;">
            <h2 style="margin-top: 0px;">Or continue with</h2>
            <img class="oauth-button" id="oauth-codeberg" src="assets/img/codeberg.svg" />
            <img class="oauth-button" id="oauth-github" src="assets/img/github.svg" />
            <img class="oauth-button" id="oauth-google" src="assets/img/google.svg" />
        </div>
    </div>
    <script src="/assets/js/ui.js"></script>
    <script src="/assets/js/login.js" type="module"></script>
    <script>
        document.getElementById('signup-switch')?.addEventListener('click', () => {
            document.getElementById('signup-tab').click();
        });
    </script>
</body>

</html>
